name: Run Tests on Hetzner

on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'TestNG suite to run'
        required: false
        default: 'testng.xml'
        type: string
      server_type:
        description: 'Hetzner server type'
        required: false
        default: 'cax11'
        type: string
      location:
        description: 'Datacenter location'
        required: false
        default: 'nbg1'
        type: choice
        options:
          - nbg1
          - fsn1
          - hel1

jobs:
  test-on-hetzner:
    runs-on: ubuntu-latest
    environment: test

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v7

      # -----------------------------------------------------------------------
      # 2. Generate temporary SSH key
      # -----------------------------------------------------------------------
      - name: Generate temporary SSH key
        id: ssh-key
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t ed25519 -f ~/.ssh/hetzner_tmp -N "" -C "github-actions-hetzner-${{ github.run_id }}"
          {
            echo "private_key<<EOF"
            cat ~/.ssh/hetzner_tmp
            echo "EOF"
          } >> $GITHUB_OUTPUT
          echo "public_key=$(cat ~/.ssh/hetzner_tmp.pub)" >> $GITHUB_OUTPUT

      # -----------------------------------------------------------------------
      # 3. Create Hetzner Cloud server
      # -----------------------------------------------------------------------
      - name: Validate HCLOUD_TOKEN
        run: |
          if [ -z "${{ secrets.HCLOUD_TOKEN }}" ]; then
            echo "::error::HCLOUD_TOKEN is empty or not set!"
            echo "Add it at: Settings → Environments → test → Environment secrets → HCLOUD_TOKEN"
            exit 1
          fi

      - name: Create Hetzner server
        id: server
        run: |
          # Build cloud-init with the temporary SSH key baked in (printf avoids heredoc YAML issues)
          PUB_KEY="${{ steps.ssh-key.outputs.public_key }}"
          USER_DATA=$(printf '#cloud-config\npackage_update: true\npackage_upgrade: false\npackages:\n  - openjdk-21-jdk-headless\n  - maven\n  - xvfb\n  - curl\nssh_authorized_keys:\n  - %s\n' "${PUB_KEY}" | base64 -w0)

          RESPONSE=$(curl -sS -X POST "https://api.hetzner.cloud/v1/servers" \
            -H "Authorization: Bearer ${{ secrets.HCLOUD_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"gh-tests-${{ github.run_id }}\",
              \"server_type\": \"${{ inputs.server_type }}\",
              \"image\": \"ubuntu-24.04\",
              \"location\": \"${{ inputs.location }}\",
              \"start_after_create\": true,
              \"public_net\": {
                \"enable_ipv4\": true,
                \"enable_ipv6\": false
              },
              \"user_data\": \"${USER_DATA}\"
            }")

          echo "Server creation response: $RESPONSE"
          SERVER_ID=$(echo "$RESPONSE" | jq -r '.server.id // empty')
          if [ -z "$SERVER_ID" ]; then
            echo "FAILED to create server!"
            echo "$RESPONSE" | jq '.'
            exit 1
          fi

          echo "server_id=$SERVER_ID" >> $GITHUB_OUTPUT

          # Attach our temporary public key
          echo "Server $SERVER_ID created with cloud-init (SSH key baked in)."

      # -----------------------------------------------------------------------
      # 4. Wait for server ready + get IP
      # -----------------------------------------------------------------------
      - name: Wait for server ready
        id: wait
        run: |
          SERVER_ID="${{ steps.server.outputs.server_id }}"

          for i in $(seq 1 30); do
            DATA=$(curl -sS "https://api.hetzner.cloud/v1/servers/$SERVER_ID" \
              -H "Authorization: Bearer ${{ secrets.HCLOUD_TOKEN }}")
            STATUS=$(echo "$DATA" | jq -r '.server.status')
            IP=$(echo "$DATA" | jq -r '.server.public_net.ipv4.ip // empty')

            if [ "$STATUS" = "running" ] && [ -n "$IP" ]; then
              echo "Server ready: $IP"
              echo "server_ip=$IP" >> $GITHUB_OUTPUT
              break
            fi
            echo "Waiting... status=$STATUS ip=$IP (attempt $i/30)"
            sleep 10
          done

          if [ -z "$IP" ]; then
            echo "Server never became ready"
            exit 1
          fi

          # Allow cloud-init to finish
          sleep 10

      # -----------------------------------------------------------------------
      # 5. Configure SSH
      # -----------------------------------------------------------------------
      - name: Configure SSH
        run: |
          echo "${{ steps.ssh-key.outputs.private_key }}" > ~/.ssh/hetzner_tmp
          chmod 600 ~/.ssh/hetzner_tmp
          ssh-keyscan -H ${{ steps.wait.outputs.server_ip }} >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/hetzner_tmp root@${{ steps.wait.outputs.server_ip }} 'echo "SSH OK"'

      # -----------------------------------------------------------------------
      # 6. Install Google Chrome on remote
      # -----------------------------------------------------------------------
      - name: Install Chrome on server
        run: |
          ssh -i ~/.ssh/hetzner_tmp root@${{ steps.wait.outputs.server_ip }} 'set -e; wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb; dpkg -i /tmp/chrome.deb 2>/dev/null || apt-get install -y -f; rm -f /tmp/chrome.deb; echo "Chrome: $(google-chrome --version)"'

      # -----------------------------------------------------------------------
      # 7. SCP project files
      # -----------------------------------------------------------------------
      - name: Copy project to server
        run: |
          rsync -avz -e "ssh -i ~/.ssh/hetzner_tmp" \
            --exclude '.git' \
            --exclude 'target' \
            --exclude 'test-output' \
            ./ root@${{ steps.wait.outputs.server_ip }}:/root/project/

      # -----------------------------------------------------------------------
      # 8. Write remote test script & SCP it
      # -----------------------------------------------------------------------
      - name: Prepare remote test script
        run: |
          printf '#!/usr/bin/env bash\nset -euo pipefail\n\ncd /root/project\n\n# Start virtual display (fallback for headless)\nXvfb :99 -screen 0 1920x1080x24 &\nXVFB_PID=$!\nexport DISPLAY=:99\n\n# Run tests (WebDriverManager auto-downloads chromedriver)\nmvn test -DsuiteXmlFile="${SUITE_XML:-testng.xml}" -Dheaded=false 2>&1 | tee test-run.log\nRC=${PIPESTATUS[0]}\n\nkill $XVFB_PID 2>/dev/null || true\nexit $RC\n' > /tmp/remote-test.sh

          chmod +x /tmp/remote-test.sh
          scp -i ~/.ssh/hetzner_tmp /tmp/remote-test.sh root@${{ steps.wait.outputs.server_ip }}:/root/remote-test.sh

      # -----------------------------------------------------------------------
      # 9. Run tests on Hetzner
      # -----------------------------------------------------------------------
      - name: Run tests on Hetzner
        id: run-tests
        env:
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
          SUITE: ${{ inputs.suite }}
        run: |
          IP="${{ steps.wait.outputs.server_ip }}"
          ssh -i ~/.ssh/hetzner_tmp root@"$IP" \
            "export REQRES_API_KEY='${REQRES_API_KEY}' SUITE_XML='${SUITE}' && bash /root/remote-test.sh"

      # -----------------------------------------------------------------------
      # 10. Download results
      # -----------------------------------------------------------------------
      - name: Download test results
        if: always()
        run: |
          IP="${{ steps.wait.outputs.server_ip }}"
          mkdir -p ./test-output-hetzner
          rsync -avz -e "ssh -i ~/.ssh/hetzner_tmp" \
            root@"$IP":/root/project/test-output/ ./test-output-hetzner/ || true
          rsync -avz -e "ssh -i ~/.ssh/hetzner_tmp" \
            root@"$IP":/root/project/test-run.log ./test-run-hetzner.log || true

      # -----------------------------------------------------------------------
      # 11. Upload artifacts
      # -----------------------------------------------------------------------
      - name: Upload ExtentReports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: extent-report-hetzner
          path: test-output-hetzner/extent-reports/
          retention-days: 7

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-log-hetzner
          path: test-run-hetzner.log
          retention-days: 7

      # -----------------------------------------------------------------------
      # 12. Delete Hetzner server (ALWAYS — even on failure/cancel)
      # -----------------------------------------------------------------------
      - name: Delete Hetzner server
        if: always()
        run: |
          SERVER_ID="${{ steps.server.outputs.server_id }}"
          if [ -n "$SERVER_ID" ]; then
            echo "Deleting server $SERVER_ID..."
            curl -sS -X DELETE "https://api.hetzner.cloud/v1/servers/$SERVER_ID" \
              -H "Authorization: Bearer ${{ secrets.HCLOUD_TOKEN }}"
            echo "Server $SERVER_ID deleted."
          fi

      # -----------------------------------------------------------------------
      # 13. Cleanup SSH key
      # -----------------------------------------------------------------------
      - name: Cleanup SSH key
        if: always()
        run: |
          rm -f ~/.ssh/hetzner_tmp ~/.ssh/hetzner_tmp.pub /tmp/remote-test.sh
