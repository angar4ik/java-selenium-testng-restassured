name: Run Tests on Hetzner (Self-Hosted Runner)

on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'TestNG suite to run'
        required: false
        default: 'testng.xml'
        type: string
      server_type:
        description: 'Hetzner server type'
        required: false
        default: 'cx23'
        type: string
      location:
        description: 'Datacenter location'
        required: false
        default: 'nbg1'
        type: string

permissions:
  actions: read
  contents: read

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Job 1 — Provision Hetzner server, install runner, register it
  # ═══════════════════════════════════════════════════════════════════════════
  provision:
    runs-on: ubuntu-latest
    environment: test
    outputs:
      server_id: ${{ steps.server.outputs.server_id }}
      server_ip: ${{ steps.wait.outputs.server_ip }}
      runner_label: ${{ steps.runner.outputs.label }}
      ssh_key_id: ${{ steps.upload-key.outputs.ssh_key_id }}

    steps:
      # -------------------------------------------------------------------
      # 1.1 Generate a temporary SSH key pair
      # -------------------------------------------------------------------
      - name: Generate SSH key
        id: ssh-key
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t ed25519 -f ~/.ssh/hetzner_tmp -N "" -C "gh-runner-${{ github.run_id }}"
          {
            echo "private_key<<EOF"
            cat ~/.ssh/hetzner_tmp
            echo "EOF"
          } >> $GITHUB_OUTPUT
          echo "public_key=$(cat ~/.ssh/hetzner_tmp.pub)" >> $GITHUB_OUTPUT

      # -------------------------------------------------------------------
      # 1.2 Upload SSH key to Hetzner (hypervisor injects it at boot — instant, reliable)
      # -------------------------------------------------------------------
      - name: Upload SSH key to Hetzner
        id: upload-key
        run: |
          RESP=$(curl -sS -X POST "https://api.hetzner.cloud/v1/ssh_keys" \
            -H "Authorization: Bearer ${{ secrets.HCLOUD_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"gh-runner-${{ github.run_id }}\",
              \"public_key\": \"${{ steps.ssh-key.outputs.public_key }}\"
            }")

          SSH_KEY_ID=$(echo "$RESP" | jq -r '.ssh_key.id // empty')
          if [ -z "$SSH_KEY_ID" ]; then
            echo "FAILED to upload SSH key!"
            echo "$RESP" | jq '.'
            exit 1
          fi

          echo "ssh_key_id=$SSH_KEY_ID" >> $GITHUB_OUTPUT
          echo "SSH key uploaded (ID: $SSH_KEY_ID)"

      # -------------------------------------------------------------------
      # 1.3 Validate token
      # -------------------------------------------------------------------
      - name: Validate HCLOUD_TOKEN
        run: |
          if [ -z "${{ secrets.HCLOUD_TOKEN }}" ]; then
            echo "::error::HCLOUD_TOKEN is empty or not set!"
            echo "Add it at: Settings → Environments → test → Environment secrets → HCLOUD_TOKEN"
            exit 1
          fi

      # -------------------------------------------------------------------
      # 1.4 Create Hetzner server (SSH key via native API, cloud-init only for packages)
      # -------------------------------------------------------------------
      - name: Create Hetzner server
        id: server
        run: |
          USER_DATA=$(printf '#cloud-config\npackage_update: true\npackage_upgrade: false\napt:\n  conf: |\n    DPkg::Lock::Timeout "300";\npackages:\n  - openjdk-21-jdk-headless\n  - maven\n  - git\n  - curl\n  - wget\n  - xvfb\n  - libnss3\n  - libatk-bridge2.0-0\n  - libcups2t64\n  - libdrm2\n  - libxkbcommon0\n  - libxcomposite1\n  - libxdamage1\n  - libxrandr2\n  - libgbm1\n  - libasound2t64\n  - fonts-liberation\n' | base64 -w0)

          RESPONSE=$(curl -sS -X POST "https://api.hetzner.cloud/v1/servers" \
            -H "Authorization: Bearer ${{ secrets.HCLOUD_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"gh-runner-${{ github.run_id }}\",
              \"server_type\": \"${{ inputs.server_type }}\",
              \"image\": \"ubuntu-24.04\",
              \"location\": \"${{ inputs.location }}\",
              \"start_after_create\": true,
              \"ssh_keys\": [${{ steps.upload-key.outputs.ssh_key_id }}],
              \"public_net\": {
                \"enable_ipv4\": true,
                \"enable_ipv6\": false
              },
              \"user_data\": \"${USER_DATA}\"
            }")

          SERVER_ID=$(echo "$RESPONSE" | jq -r '.server.id // empty')
          if [ -z "$SERVER_ID" ]; then
            echo "FAILED to create server!"
            echo "$RESPONSE" | jq '.'
            exit 1
          fi

          echo "server_id=$SERVER_ID" >> $GITHUB_OUTPUT
          echo "Server $SERVER_ID created."

      # -------------------------------------------------------------------
      # 1.5 Wait for server running + get IP
      # -------------------------------------------------------------------
      - name: Wait for server ready
        id: wait
        run: |
          SERVER_ID="${{ steps.server.outputs.server_id }}"
          IP=""
          for i in $(seq 1 30); do
            DATA=$(curl -sS "https://api.hetzner.cloud/v1/servers/$SERVER_ID" \
              -H "Authorization: Bearer ${{ secrets.HCLOUD_TOKEN }}")
            STATUS=$(echo "$DATA" | jq -r '.server.status')
            IP=$(echo "$DATA" | jq -r '.server.public_net.ipv4.ip // empty')
            if [ "$STATUS" = "running" ] && [ -n "$IP" ]; then
              echo "Server ready: $IP"
              echo "server_ip=$IP" >> $GITHUB_OUTPUT
              break
            fi
            echo "Waiting... status=$STATUS  ip=$IP  ($i/30)"
            sleep 10
          done
          if [ -z "$IP" ]; then
            echo "Server never became ready."
            exit 1
          fi

      # -------------------------------------------------------------------
      # 1.6 Setup server: wait for SSH + install Chrome & Xvfb
      # -------------------------------------------------------------------
      - name: Setup server
        run: |
          echo "${{ steps.ssh-key.outputs.private_key }}" > ~/.ssh/hetzner_tmp
          chmod 600 ~/.ssh/hetzner_tmp
          ssh-keyscan -H ${{ steps.wait.outputs.server_ip }} >> ~/.ssh/known_hosts 2>/dev/null || true

          IP="${{ steps.wait.outputs.server_ip }}"

          # Wait for SSH (key injected by hypervisor, cloud-init installs packages)
          CONNECTED=false
          for i in $(seq 1 30); do
            echo "SSH attempt $i/30..."
            if ssh -i ~/.ssh/hetzner_tmp -o ConnectTimeout=10 \
              -o StrictHostKeyChecking=accept-new root@"$IP" 'echo SSH_OK'; then
              echo "SSH key auth OK (attempt $i)"
              CONNECTED=true
              break
            fi
            echo "  waiting..."
            sleep 5
          done

          if [ "$CONNECTED" != "true" ]; then
            echo "::error::SSH failed after 30 attempts"
            exit 1
          fi

          # Install Chrome + start Xvfb
          echo "Installing Chrome & starting Xvfb..."

          printf '#!/bin/bash\nset -euo pipefail\nexport DEBIAN_FRONTEND=noninteractive\nAPT_OPTS="-o DPkg::Lock::Timeout=300"\n\n# Install Maven + Xvfb\napt-get $APT_OPTS install -y -qq maven xvfb\n\n# Install Chrome\necho "Downloading Chrome..."\nwget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb || { echo "DOWNLOAD FAILED"; exit 1; }\necho "Installing Chrome..."\napt-get $APT_OPTS install -y -qq /tmp/chrome.deb 2>&1 | tail -5\nrm -f /tmp/chrome.deb\n\n# Verify Chrome\nif [ -f /opt/google/chrome/chrome ]; then\n  ln -sf /opt/google/chrome/chrome /usr/bin/google-chrome-stable\n  ln -sf /opt/google/chrome/chrome /usr/bin/google-chrome\n  echo "Chrome: $(/opt/google/chrome/chrome --version)"\nelse\n  echo "CHROME NOT FOUND"\n  dpkg -l | grep chrome || true\n  exit 1\nfi\n\nnohup Xvfb :99 -screen 0 1920x1080x24 >/dev/null 2>&1 &\necho "Setup done."\n' > /tmp/setup.sh

          scp -i ~/.ssh/hetzner_tmp /tmp/setup.sh root@"$IP":/tmp/setup.sh
          ssh -i ~/.ssh/hetzner_tmp root@"$IP" bash /tmp/setup.sh
          echo "Setup complete."

      # -------------------------------------------------------------------
      # 1.7 Install & start self-hosted runner
      # -------------------------------------------------------------------
      - name: Install & start self-hosted runner
        id: runner
        run: |
          LABEL="hetzner-${{ github.run_id }}"
          echo "label=$LABEL" >> $GITHUB_OUTPUT

          # Get registration token
          RESP=$(curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runners/registration-token")
          TOKEN=$(echo "$RESP" | jq -r '.token')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::Could not obtain runner registration token. Check GH_PAT secret."
            exit 1
          fi

          # Get latest runner version on GitHub side (has jq), pass to remote
          RUNNER_VER=$(curl -sS https://api.github.com/repos/actions/runner/releases/latest | jq -r '.tag_name')
          RUNNER_VER="${RUNNER_VER#v}"  # strip leading 'v'
          echo "Runner version: $RUNNER_VER"

          # Build & SCP runner setup script
          printf '#!/bin/bash\nset -euo pipefail\n\nmkdir -p /root/actions-runner && cd /root/actions-runner\n\nexport RUNNER_ALLOW_RUNASROOT=1\n\ncurl -o runner.tar.gz -L "https://github.com/actions/runner/releases/download/v%s/actions-runner-linux-x64-%s.tar.gz"\ntar xzf runner.tar.gz && rm runner.tar.gz\n./bin/installdependencies.sh 2>&1 | tail -3 || true\nRUNNER_ALLOW_RUNASROOT=1 ./config.sh --url "https://github.com/${{ github.repository }}" --token "%s" --name "%s" --labels "%s" --ephemeral --unattended --work _work --replace\nnohup ./run.sh > /tmp/runner.log 2>&1 &\nsleep 2\necho "Runner PID: $(pgrep -f '\"'\"'Runner.Listener'\"'\"' || echo N/A)"\n' "${RUNNER_VER}" "${RUNNER_VER}" "${TOKEN}" "${LABEL}" "${LABEL}" > /tmp/runner-setup.sh
          chmod +x /tmp/runner-setup.sh
          scp -i ~/.ssh/hetzner_tmp /tmp/runner-setup.sh root@${{ steps.wait.outputs.server_ip }}:/root/runner-setup.sh
          ssh -i ~/.ssh/hetzner_tmp root@${{ steps.wait.outputs.server_ip }} bash /root/runner-setup.sh

          # Wait for runner online
          echo "Waiting for runner '${LABEL}' to come online..."
          for i in $(seq 1 20); do
            STATUS=$(curl -sS \
              -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runners" \
              | jq -r ".runners[] | select(.name == \"${LABEL}\") | .status // \"offline\"")
            if [ "$STATUS" = "online" ]; then
              echo "Runner '${LABEL}' is online (attempt $i)!"
              break
            fi
            echo "  $i/20 — status = $STATUS"
            sleep 5
          done

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 2 — Run tests on the self-hosted runner
  # ═══════════════════════════════════════════════════════════════════════════
  test:
    needs: provision
    runs-on:
      - self-hosted
      - ${{ needs.provision.outputs.runner_label }}
    environment: test
    env:
      DISPLAY: :99
      CHROME_BIN: /usr/bin/google-chrome-stable

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v6
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('pom.xml') }}
          restore-keys: maven-${{ runner.os }}-

      - name: Run tests
        env:
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
        run: mvn test -DsuiteXmlFile=${{ inputs.suite }}

      - name: Upload ExtentReports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: extent-report-hetzner
          path: test-output/extent-reports/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 3 — Cleanup: delete server + SSH key (ALWAYS)
  # ═══════════════════════════════════════════════════════════════════════════
  cleanup:
    needs: [provision, test]
    if: always()
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Delete Hetzner server
        run: |
          SERVER_ID="${{ needs.provision.outputs.server_id }}"
          if [ -n "$SERVER_ID" ] && [ "$SERVER_ID" != "" ]; then
            echo "Deleting server $SERVER_ID..."
            curl -sS -X DELETE "https://api.hetzner.cloud/v1/servers/$SERVER_ID" \
              -H "Authorization: Bearer ${{ secrets.HCLOUD_TOKEN }}"
            echo "Server $SERVER_ID deleted."
          else
            echo "No server ID — skipping."
          fi

      - name: Delete SSH key from Hetzner
        if: always()
        run: |
          SSH_KEY_ID="${{ needs.provision.outputs.ssh_key_id }}"
          if [ -n "$SSH_KEY_ID" ] && [ "$SSH_KEY_ID" != "" ]; then
            echo "Deleting SSH key $SSH_KEY_ID..."
            curl -sS -X DELETE "https://api.hetzner.cloud/v1/ssh_keys/$SSH_KEY_ID" \
              -H "Authorization: Bearer ${{ secrets.HCLOUD_TOKEN }}"
            echo "SSH key $SSH_KEY_ID deleted."
          else
            echo "No SSH key ID — skipping."
          fi
