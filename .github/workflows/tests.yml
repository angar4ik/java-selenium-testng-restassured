name: Run Tests

on:
  workflow_dispatch:     # manual trigger only
    inputs:
      suite:
        description: 'TestNG suite to run'
        required: false
        default: 'testng.xml'
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    environment: test                 # ← ties to the 'test' environment with your secret

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v6
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('pom.xml') }}
          restore-keys: maven-${{ runner.os }}-

      - name: Run tests
        env:
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}   # ← exposes secret as env var
        run: mvn test -DsuiteXmlFile=${{ inputs.suite }}

      - name: Upload ExtentReports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: extent-report
          path: test-output/extent-reports/
          retention-days: 7


